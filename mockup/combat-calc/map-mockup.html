<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Terrain-Cradle Map Workbench</title>
<style>
  body { margin: 0; font: 13px/1.4 system-ui, sans-serif; display: flex; height: 100vh; }
  #map { flex: 1; background: #102733; } /* sea */
  #panel { width: 350px; background: #171b21; color: #d8dee6; padding: 14px; overflow-y: auto; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    margin: 16px 0 5px; color: #7fbf9f; border-bottom: 1px solid #2a2f37; padding-bottom: 3px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  td, th { padding: 2px 4px; text-align: right; border-bottom: 1px solid #2a2f37; }
  th:first-child, td:first-child { text-align: left; }
  .pass { color: #6f6; } .fail { color: #f77; }
  .verdict { font-size: 14px; font-weight: bold; margin: 6px 0; }
  .warn { color: #eb8; font-size: 12px; }
  .rlabel { fill: #fff; font: 700 14px system-ui; paint-order: stroke; stroke: #0009;
    stroke-width: 3px; text-anchor: middle; }
  .choke { fill: #ffd27f; font: 700 10px system-ui; paint-order: stroke; stroke: #0008;
    stroke-width: 2.5px; text-anchor: middle; }
  .cap { fill: #ffe9a8; font: 12px system-ui; text-anchor: middle; }
</style>
</head>
<body>
<svg id="map"></svg>
<div id="panel"></div>

<script type="module" src="econ.js"></script>
<script type="module" src="match.js"></script>
<script type="module" src="map-loader.js"></script>
<script type="module" src="map-gate.js"></script>
<script type="module" src="map-gen.js"></script>
<script type="module">
'use strict';
const { CRADLE_MAP: MAP, CRADLE_BINDING: BINDING, CRADLE_META: META, GEN_DIAG } = window.TC.gen;
const { loadMap } = window.TC.loader;
const { gateReport, viableBindings, enumerateBindings } = window.TC.gate;
const { projectable, shieldMass } = window.TC.match;
const { nationalCap, income } = window.TC.econ;

const HEX = META.hexR;
const NB = [[1, 0], [1, -1], [0, -1], [-1, 0], [-1, 1], [0, 1]];
// neighbor across the edge between corners[i] and corners[i+1] — corner 0
// sits at -30° (upper-right), so edge i=0 faces (1,0), i=1 faces (0,1), …
// (NB above is unordered adjacency; using it per-edge draws 4 of 6 borders
// on the wrong side of the hex)
const EDGE_NB = [[1, 0], [0, 1], [-1, 1], [-1, 0], [0, -1], [1, -1]];
const TERR = { plains: '#7d9a54', 'river-valley': '#5d9078', steppe: '#a89a55',
  desert: '#c6aa69', mountain: '#877663', oasis: '#6fae7c', highland: '#5e6b4a' };
const RANGE_FILL = '#4e4034';
// choked-border stroke per class + door width (mirrors map-gen DOOR)
const CLS_STYLE = { pass: ['#6b543f', 5], river: ['#57a7d8', 4.5],
  forest: ['#2f4d22', 4.5], hills: ['#8a744c', 4.5] };
const DOORCAP = { pass: 1000, river: 1000, forest: 1500, hills: 1300 };
const nameOf = Object.fromEntries(MAP.regions.map((r) => [r.id, r.name]));

function hexToPixel(q, r) { return { x: HEX * Math.sqrt(3) * (q + r / 2), y: HEX * 1.5 * r }; }
function corners(x, y) {
  const p = [];
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 180 * (60 * i - 30);
    p.push([x + HEX * Math.cos(a), y + HEX * Math.sin(a)]);
  }
  return p;
}
// --- preview overrides (user fine-tuning layer) -----------------------------
// One store: seat moves (city/capital) + hex swaps between sectors of the
// same region. All swaps preserve regional totals. Export JSON → hand to the
// agent → confirmed moves get baked into map-gen.js (the law); this layer is
// preview only.
const OV_LS = 'terrainMapOverrides.v1';
const OV = Object.assign({ citySeat: {}, capSeat: {}, hexSwap: {} },
  JSON.parse(localStorage.getItem(OV_LS) || '{}'));
{ // migrate legacy city-only store
  const legacy = JSON.parse(localStorage.getItem('terrainCityOverride.v1') || 'null');
  if (legacy) { Object.assign(OV.citySeat, legacy); localStorage.removeItem('terrainCityOverride.v1'); }
}
const saveOV = () => { localStorage.setItem(OV_LS, JSON.stringify(OV)); location.reload(); };
// 1) hex swaps: move hexes to their overridden sector (same region only)
for (const [hk, newSid] of Object.entries(OV.hexSwap)) {
  const ns = MAP.sectors[newSid];
  if (!ns) continue;
  let cur = null, idx = -1;
  for (const sec of Object.values(MAP.sectors)) {
    if (sec.regionId !== ns.regionId) continue;
    const i = sec.mapUnits.findIndex((u) => u.q + ',' + u.r === hk);
    if (i >= 0) { cur = sec; idx = i; break; }
  }
  if (!cur || cur.id === newSid) continue;
  const [u] = cur.mapUnits.splice(idx, 1);
  if (ns.mapUnits[0]) u.terrainLayer = ns.mapUnits[0].terrainLayer;
  ns.mapUnits.push(u);
}
// 2) seat moves: values (and sector terrain — 서역 city IS the oasis) swap
function swapSeat(origSid, newSid) {
  const a = MAP.sectors[origSid], b = MAP.sectors[newSid];
  [a.economyValue, b.economyValue] = [b.economyValue, a.economyValue];
  [a.populationValue, b.populationValue] = [b.populationValue, a.populationValue];
  // terrain travels with the seat ONLY when the seat IS the terrain (oasis);
  // elsewhere terrain belongs to the ground (관중 mountain gate-city lesson)
  const ta = a.mapUnits[0]?.terrainLayer, tb = b.mapUnits[0]?.terrainLayer;
  if (ta && tb && ta !== tb && (ta === 'oasis' || tb === 'oasis')) {
    for (const u of a.mapUnits) u.terrainLayer = tb;
    for (const u of b.mapUnits) u.terrainLayer = ta;
  }
}
const cityOf = { ...META.cities }, capOf = { ...META.capitals };
for (const [seats, ov] of [[cityOf, OV.citySeat], [capOf, OV.capSeat]]) {
  for (const [rid, sid] of Object.entries(ov)) {
    const orig = seats[rid];
    if (!orig || !MAP.sectors[sid] || MAP.sectors[sid].regionId !== rid || sid === orig) continue;
    swapSeat(orig, sid);
    seats[rid] = sid;
  }
}

// hex → sector/region lookup
const hexOwn = new Map(); // 'q,r' -> {sid, rid, terr, x, y}
for (const [sid, sec] of Object.entries(MAP.sectors)) {
  for (const u of sec.mapUnits) {
    const { x, y } = hexToPixel(u.q, u.r);
    hexOwn.set(u.q + ',' + u.r, { sid, rid: sec.regionId, terr: u.terrainLayer, q: u.q, r: u.r, x, y });
  }
}
function tint(hex, dv) {
  const n = parseInt(hex.slice(1), 16);
  const c = (v) => Math.max(0, Math.min(255, v + dv));
  return '#' + [c(n >> 16), c((n >> 8) & 255), c(n & 255)]
    .map((v) => v.toString(16).padStart(2, '0')).join('');
}
const pairKey = (a, b) => (a < b ? a + '|' + b : b + '|' + a);

function renderMap() {
  const svg = document.getElementById('map');
  const fills = [], borders = [], labels = [];
  let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
  const bump = (x, y) => { minX = Math.min(minX, x); minY = Math.min(minY, y);
    maxX = Math.max(maxX, x); maxY = Math.max(maxY, y); };
  // terrain fills
  for (const h of hexOwn.values()) {
    bump(h.x, h.y);
    const dv = ((h.q * 13 + h.r * 7) % 5 - 2) * 5;
    const pts = corners(h.x, h.y).map(([x, y]) => x.toFixed(1) + ',' + y.toFixed(1)).join(' ');
    fills.push(`<polygon points="${pts}" fill="${tint(TERR[h.terr] || '#888', dv)}" data-sid="${h.sid}" data-key="${h.q},${h.r}"/>`);
  }
  // void range hexes (mountain wall — non-sector terrain); the central massif
  // renders as ONE sacred mountain, not scattered dark hexes
  const massifKeys = new Set((META.massif?.hexes || []).map((h) => h.q + ',' + h.r));
  for (const h of META.rangeHexes) {
    bump(h.x, h.y);
    const isMassif = massifKeys.has(h.q + ',' + h.r);
    const pts = corners(h.x, h.y).map(([x, y]) => x.toFixed(1) + ',' + y.toFixed(1)).join(' ');
    if (isMassif) {
      fills.push(`<polygon points="${pts}" fill="#6b6156" stroke="#514840" stroke-width="1"/>`);
    } else {
      fills.push(`<polygon points="${pts}" fill="${RANGE_FILL}" stroke="#2e2620" stroke-width="1"/>`);
      fills.push(`<text x="${h.x.toFixed(1)}" y="${(h.y + 4).toFixed(1)}" text-anchor="middle" style="fill:#6d5c49;font-size:12px">▲</text>`);
    }
  }
  if (META.massif) {
    const m = META.massif;
    labels.push(`<text x="${m.cx}" y="${m.cy + 9}" text-anchor="middle" style="font-size:26px;fill:#a99a85;paint-order:stroke;stroke:#0006;stroke-width:2px">▲</text>`);
    labels.push(`<text x="${m.cx}" y="${m.cy + 26}" text-anchor="middle" style="font:600 10px system-ui;fill:#cfc2ae;paint-order:stroke;stroke:#0008;stroke-width:2px">${m.label}</text>`);
  }
  // borders: coast bold, region border by choke class, sector border thin
  const chokeMid = {}; // pairKey -> [sx, sy, n] for label placement
  for (const h of hexOwn.values()) {
    const cs = corners(h.x, h.y);
    for (let i = 0; i < 6; i++) {
      const nk = (h.q + EDGE_NB[i][0]) + ',' + (h.r + EDGE_NB[i][1]);
      const n = hexOwn.get(nk);
      const c1 = cs[i], c2 = cs[(i + 1) % 6];
      const seg = (col, w, dash) =>
        borders.push(`<line x1="${c1[0].toFixed(1)}" y1="${c1[1].toFixed(1)}" x2="${c2[0].toFixed(1)}" y2="${c2[1].toFixed(1)}" stroke="${col}" stroke-width="${w}" stroke-linecap="round"${dash ? ` stroke-dasharray="${dash}"` : ''}/>`);
      if (!n) { seg('#0a1c26', 3); continue; }               // coast / void edge
      if (n.rid !== h.rid) {
        if (h.rid > n.rid) continue; // draw each region border once
        const pk = pairKey(h.rid, n.rid);
        const cls = META.pairClass[pk] || 'open';
        const st = CLS_STYLE[cls];
        const hk = h.q + ',' + h.r;
        const pr = META.partialRivers && META.partialRivers[pk];
        if (pr && (pr.includes(hk + '|' + nk) || pr.includes(nk + '|' + hk)))
          seg(CLS_STYLE.river[0], CLS_STYLE.river[1]); // partial river: visual only, class stays open
        else if (st) seg(st[0], st[1]); else seg('#1c2b18', 2.5);
        const m = chokeMid[pk] || (chokeMid[pk] = [0, 0, 0]);
        m[0] += (c1[0] + c2[0]) / 2; m[1] += (c1[1] + c2[1]) / 2; m[2]++;
      } else if (n.sid !== h.sid && h.sid < n.sid) {
        seg('#0b0f08e0', 3, '7 5'); // sector partition — visible dashed seam
      }
    }
  }
  // choke labels (all choked border classes)
  for (const [pk, m] of Object.entries(chokeMid)) {
    const cls = META.pairClass[pk];
    if (!DOORCAP[cls]) continue;
    labels.push(`<text class="choke" x="${(m[0] / m[2]).toFixed(1)}" y="${(m[1] / m[2]).toFixed(1)}">${cls}${DOORCAP[cls]}</text>`);
  }
  // straits: dashed sea lines between representative coastal sectors
  for (const e of MAP.edges) {
    if (e.choke.class !== 'strait') continue;
    const ca = secCentroid(e.a), cb = secCentroid(e.b);
    labels.push(`<line x1="${ca.x}" y1="${ca.y}" x2="${cb.x}" y2="${cb.y}" stroke="#7fd0e8" stroke-width="2.5" stroke-dasharray="3 7" opacity=".8"/>`);
    labels.push(`<text class="choke" x="${((ca.x + cb.x) / 2).toFixed(1)}" y="${((ca.y + cb.y) / 2 - 6).toFixed(1)}" style="fill:#9fe0f5">strait${e.choke.cap}</text>`);
  }
  // capitals ★ + cities ◉ + region labels
  for (const [rid, sid] of Object.entries(capOf)) {
    const c = secCentroid(sid);
    labels.push(`<text class="cap" x="${c.x.toFixed(1)}" y="${(c.y + 4).toFixed(1)}">★</text>`);
  }
  for (const [rid, sid] of Object.entries(cityOf)) {
    const c = secCentroid(sid);
    labels.push(`<text class="cap" x="${c.x.toFixed(1)}" y="${(c.y + 5).toFixed(1)}" style="font-size:15px">◉</text>`);
  }
  for (const r of MAP.regions) {
    const c = META.regionCenters[r.id];
    labels.push(`<text class="rlabel" x="${c.x.toFixed(1)}" y="${c.y.toFixed(1)}">${r.name}</text>`);
  }
  const pad = HEX * 2.2;
  svg.setAttribute('viewBox', `${minX - pad} ${minY - pad} ${maxX - minX + pad * 2} ${maxY - minY + pad * 2}`);
  svg.innerHTML = fills.join('') + borders.join('') + labels.join('');
}
function secCentroid(sid) {
  const us = MAP.sectors[sid].mapUnits;
  let x = 0, y = 0;
  for (const u of us) { const p = hexToPixel(u.q, u.r); x += p.x; y += p.y; }
  return { x: x / us.length, y: y / us.length };
}

function renderPanel() {
  const { realms } = loadMap(MAP, { assignment: BINDING });
  const g = gateReport(MAP, BINDING);
  const v = viableBindings(MAP, 5);
  const total = enumerateBindings(MAP, 5).length;
  const rows = realms.map((r) => {
    const proj = projectable(r);
    const shield = shieldMass(r, undefined, Object.keys(r.fronts));
    const regs = (BINDING[r.name] || []).map((id) => nameOf[id]).join('+');
    return `<tr><td>${r.name} <span style="color:#8a93a0">${regs}</span></td><td>${r.fieldCap}</td><td>${proj}</td><td>${shield}</td></tr>`;
  }).join('');
  const ladder = MAP.regions.map((r) => {
    const secs = r.sectorIds.map((i) => MAP.sectors[i]);
    return `<tr><td>${r.name}</td><td>${r.sectorIds.length}</td><td>${nationalCap(secs)}</td><td>${income(secs).toFixed(1)}</td></tr>`;
  }).join('');
  const diag = [];
  if (GEN_DIAG.missingEdges.length) diag.push('missing edges: ' + GEN_DIAG.missingEdges.join(', '));
  if (GEN_DIAG.extraResidual.length) diag.push('extra edges: ' + GEN_DIAG.extraResidual.join(', '));
  if (GEN_DIAG.disconnected.length) diag.push('disconnected: ' + GEN_DIAG.disconnected.join(', '));
  document.getElementById('panel').innerHTML = `
    <h2>Inspect (hex click)</h2>
    <div id="inspect" style="min-height:34px;color:#aab4c0">클릭한 hex의 섹터 정보가 여기 표시됩니다.</div>
    <h2>Canonical binding (A–E) — all-cap</h2>
    <table><tr><th>seat</th><th>cap</th><th>proj</th><th>shield</th></tr>${rows}</table>
    <h2>Gate B (seat sizing)</h2>
    <div class="verdict ${g.b1.pass ? 'pass' : 'fail'}">B1 ${g.b1.pass ? 'PASS' : 'FAIL — ' + g.b1.offenders.join(', ')}</div>
    <div class="verdict ${g.b2.pass ? 'pass' : 'fail'}">B2 ${g.b2.pass ? 'PASS' : 'FAIL — ' + g.b2.kills.map((k) => k.attacker + '→' + k.victim).join(', ')}</div>
    <div class="verdict ${v.viableCount >= 2 ? 'pass' : 'fail'}">viable seatings ${v.viableCount} / ${total}</div>
    ${diag.length ? '<div class="warn">⚠ ' + diag.join('<br>⚠ ') + '</div>' : ''}
    <h2>Region ladder (parity v5 · econ ladder v2)</h2>
    <table><tr><th>region</th><th>sec</th><th>cap</th><th>생산/turn</th></tr>${ladder}</table>
    <p style="color:#8a93a0">★ capital · ◉ city · dashed black seams = sector
    partition · EDIT (preview layer): click hex = select/inspect → same-region
    other-sector hex = swap the two hexes; buttons re-seat city/capital;
    Export JSON → hand to the agent to bake into map-gen.js ·
    borders: brown = pass · blue = river ·
    green = forest · tan = hills (door widths labeled) ·
    dark hexes = void range (non-sector, war never crosses) · dashed = strait.
    Map derives from map-gen.js seed — edit seed + reload. Heavy checks:
    <code>node battery.js viability</code>.</p>`;
}

renderMap();
renderPanel();

// hex click → select · inspect · seat re-seat · hex swap · export
let selKey = null;
const polyOf = (key) => document.querySelector(`#map polygon[data-key="${key}"]`);
function mark(key, on) {
  const p = polyOf(key);
  if (p) { p.setAttribute('stroke', on ? '#ffec6e' : 'none'); p.setAttribute('stroke-width', on ? 3 : 0); }
}
const hasOverrides = () => Object.keys(OV.citySeat).length || Object.keys(OV.capSeat).length
  || Object.keys(OV.hexSwap).length;
document.getElementById('map').addEventListener('click', (e) => {
  const d = e.target.dataset || {};
  if (!d.sid) return;
  const sid = d.sid, key = d.key;
  const sec = MAP.sectors[sid];
  const rid = sec.regionId, rname = nameOf[rid];
  // second click on a same-region, different-sector hex → swap the two hexes
  if (selKey && selKey !== key) {
    const prev = hexOwn.get(selKey);
    if (prev && prev.rid === rid && prev.sid !== sid) {
      OV.hexSwap[selKey] = sid;
      OV.hexSwap[key] = prev.sid;
      saveOV();
      return;
    }
    mark(selKey, false);
  }
  selKey = key;
  mark(key, true);
  const isCity = cityOf[rid] === sid, isCap = capOf[rid] === sid;
  const el = document.getElementById('inspect');
  el.innerHTML = `<b>${rname}</b> · ${sid} (${sec.mapUnits.length} hex) · ${sec.mapUnits[0].terrainLayer}
    · pop ${sec.populationValue} / econ ${sec.economyValue}${isCity ? ' · <b>◉ 도시</b>' : ''}${isCap ? ' · <b>★ 수도</b>' : ''}
    <br><span style="color:#7d8794">같은 지방의 다른 섹터 hex를 클릭 → 두 hex 교환</span>
    ${cityOf[rid] && !isCity ? `<br><button id="mkcity">◉ 이 섹터를 ${rname} 도시로</button>` : ''}
    ${capOf[rid] && !isCap ? `<br><button id="mkcap">★ 이 섹터를 ${rname} 수도로</button>` : ''}
    <br><button id="ovexp">Export JSON</button>
    ${hasOverrides() ? `<button id="ovrst">전체 초기화</button>` : ''}
    <textarea id="ovout" style="display:none;width:100%;height:70px;margin-top:4px;background:#0e1116;color:#cfd6de;border:1px solid #2a2f37"></textarea>`;
  const on = (id, fn) => { const b = document.getElementById(id); if (b) b.onclick = fn; };
  on('mkcity', () => { OV.citySeat[rid] = sid; saveOV(); });
  on('mkcap', () => { OV.capSeat[rid] = sid; saveOV(); });
  on('ovrst', () => { localStorage.removeItem(OV_LS); location.reload(); });
  on('ovexp', () => {
    const out = document.getElementById('ovout');
    out.style.display = 'block';
    out.value = JSON.stringify(OV);
    out.select();
    try { navigator.clipboard.writeText(out.value); } catch {}
  });
});
</script>
</body>
</html>
